<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Heal2Rise </title>
    <meta name="description" content="Login to Heal2Rise  - Access your account for counseling and support services.">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <!-- Auth Section -->
    <section class="auth-section">
        <div class="auth-card">
            <div class="auth-logo">
                <a href="../index.html">
                    <h2><img src="../assets/images/hopeaid-logo.jpeg" alt="HopeAid" style="width: 50px; height: 50px; border-radius: 50%; margin-right: 10px; vertical-align: middle;"> Heal2Rise</h2>
                </a>
                <p class="text-muted mt-2">Welcome back! Please login to continue.</p>
            </div>
            
            <form id="loginForm" action="../api/login.php" method="POST">
                <!-- User Type Selection -->
                <div class="mb-4">
                    <label class="form-label">Login As</label>
                    <div class="row g-2">
                        <div class="col-4">
                            <input type="radio" class="btn-check" name="user_type" id="userType" value="user" checked>
                            <label class="btn btn-outline-primary w-100" for="userType">
                                <i class="fas fa-user mb-1 d-block"></i>User
                            </label>
                        </div>
                        <div class="col-4">
                            <input type="radio" class="btn-check" name="user_type" id="ngoType" value="ngo">
                            <label class="btn btn-outline-primary w-100" for="ngoType">
                                <i class="fas fa-building mb-1 d-block"></i>NGO
                            </label>
                        </div>
                        <div class="col-4">
                            <input type="radio" class="btn-check" name="user_type" id="adminType" value="admin">
                            <label class="btn btn-outline-primary w-100" for="adminType">
                                <i class="fas fa-shield-alt mb-1 d-block"></i>Admin
                            </label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                        <input type="email" class="form-control" name="email" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" class="form-control" name="password" id="password" placeholder="Enter your password" required>
                        <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="remember" id="remember">
                        <label class="form-check-label" for="remember">Remember me</label>
                    </div>
                    <a href="forgot-password.html" class="text-primary">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    <i class="fas fa-sign-in-alt me-2"></i>Login
                </button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html">Register here</a></p>
                <div class="mt-3">
                    <p class="text-muted">Are you an NGO? <a href="ngo-register.html">Register as NGO</a></p>
                </div>
            </div>

            <div class="text-center mt-4">
                <a href="../index.html" class="text-muted">
                    <i class="fas fa-arrow-left me-1"></i>Back to Home
                </a>
            </div>
        </div>
    </section>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });

        // Form submission
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const userType = formData.get('user_type');
            
            // Show loading
            const submitBtn = this.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Logging in...';
            submitBtn.disabled = true;
            
            // Simulate API call (replace with actual API endpoint)
            setTimeout(() => {
                // For demo purposes, redirect based on user type
                switch(userType) {
                    case 'user':
                        window.location.href = 'user-dashboard.html';
                        break;
                    case 'ngo':
                        window.location.href = 'ngo-dashboard.html';
                        break;
                    case 'admin':
                        window.location.href = 'admin-dashboard.html';
                        break;
                }
            }, 1500);
        });

        // Show toast notification
        function showToast(message, type = 'success') {
            const toastContainer = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `custom-toast toast-${type}`;
            
            const icon = type === 'success' ? 'check-circle' : 
                        type === 'error' ? 'times-circle' : 
                        type === 'warning' ? 'exclamation-triangle' : 'info-circle';
            
            toast.innerHTML = `
                <div class="toast-icon"><i class="fas fa-${icon}"></i></div>
                <div>${message}</div>
            `;
            
            toastContainer.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
    </script>
</body>
</html>
